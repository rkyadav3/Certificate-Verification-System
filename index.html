<!DOCTYPE html>
<html>
<head>
  <title>Certificate DApp</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h2>🎓 Certificate Verification</h2>

<button onclick="connectWallet()">Connect Freighter</button>
<p id="wallet">Not connected</p>

<hr>

<h3>Test Input (UI only)</h3>
<input type="text" id="data" placeholder="Enter something">
<button onclick="test()">Test</button>

<p id="result"></p>

<script>
  let userAddress = null;

  async function connectWallet() {
    // ✅ Check if Freighter exists
    if (!window.freighterApi) {
      alert("❌ Freighter not installed. Install extension first.");
      return;
    }

    try {
      // ✅ Request access
      const user = await window.freighterApi.getUserInfo();

      userAddress = user.publicKey;

      document.getElementById("wallet").innerText =
        "Connected: " + userAddress;

      console.log("Wallet connected:", user);

    } catch (e) {
      console.error(e);
      alert("❌ Connection failed. Approve access in Freighter.");
    }
  }

  function test() {
    const val = document.getElementById("data").value;

    document.getElementById("result").innerText =
      "You entered: " + val;
  }
</script>

</body>
</html>
